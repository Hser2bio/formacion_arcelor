services:
  wasp-desktop:
    build: .
    container_name: wasp_desktop
    restart: unless-stopped

    volumes:
      - ./workspace:/home/dev

    expose:
      - "6080"

    shm_size: "1gb"

  caddy:
    image: caddy:latest
    container_name: wasp_caddy
    restart: unless-stopped

    ports:
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - wasp-desktop

volumes:
  caddy_data:
  caddy_config:
